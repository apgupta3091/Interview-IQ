services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-iq-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: interviewiq
      POSTGRES_PASSWORD: interviewiq_secret
      POSTGRES_DB: interviewiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewiq -d interviewiq"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
