basePath: /api
definitions:
  handlers.categoryStatsResponse:
    properties:
      category:
        type: string
      problem_count:
        type: integer
      strength:
        type: number
    type: object
  handlers.errorResponse:
    properties:
      error:
        type: string
    type: object
  handlers.listProblemsResponse:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      problems:
        items:
          $ref: '#/definitions/handlers.problemResponse'
        type: array
      total:
        type: integer
    type: object
  handlers.logProblemRequest:
    properties:
      attempts:
        type: integer
      categories:
        items:
          type: string
        type: array
      difficulty:
        type: string
      looked_at_solution:
        type: boolean
      name:
        type: string
      solution_type:
        description: |-
          SolutionType indicates how the user solved the problem.
          Accepted values: "none" (default), "brute_force", "optimal".
          "brute_force" applies a -15 point penalty; the others carry no penalty.
        type: string
      time_taken_mins:
        type: integer
    type: object
  handlers.problemResponse:
    properties:
      attempts:
        type: integer
      categories:
        items:
          type: string
        type: array
      created_at:
        type: string
      decayed_score:
        type: number
      difficulty:
        type: string
      id:
        type: integer
      looked_at_solution:
        type: boolean
      name:
        type: string
      score:
        type: integer
      solution_type:
        type: string
      solved_at:
        type: string
      time_taken_mins:
        type: integer
    type: object
  handlers.weakestResponse:
    properties:
      category:
        type: string
      recommendations:
        items:
          type: string
        type: array
      strength:
        type: number
    type: object
host: localhost:8080
info:
  contact: {}
  description: Backend API for tracking LeetCode problem attempts, computing skill
    scores with time decay, and surfacing category weaknesses.
  title: Interview Skill Radar API
  version: "1.0"
paths:
  /categories/stats:
    get:
      description: Returns the average decayed score per category for the authenticated
        user. Strength is a 0–100 value representing current mastery. Categories with
        no problems are omitted.
      produces:
      - application/json
      responses:
        "200":
          description: Per-category strength scores
          schema:
            items:
              $ref: '#/definitions/handlers.categoryStatsResponse'
            type: array
        "401":
          description: Missing or invalid JWT token
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Get category strength scores
      tags:
      - categories
  /categories/weakest:
    get:
      description: Identifies the category with the lowest average decayed score and
        returns 3 curated LeetCode problems to practice. Used to drive the dashboard
        weakness banner.
      produces:
      - application/json
      responses:
        "200":
          description: Weakest category with 3 recommended problems
          schema:
            $ref: '#/definitions/handlers.weakestResponse'
        "401":
          description: Missing or invalid JWT token
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "404":
          description: No problems logged yet
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Get weakest category with recommendations
      tags:
      - categories
  /problems:
    get:
      description: Returns a paginated, filtered list of problems for the authenticated
        user, always sorted by created_at DESC. Supports name search, date range,
        category/difficulty/score filters, and offset-based pagination.
      parameters:
      - description: Name search (case-insensitive partial match)
        in: query
        name: q
        type: string
      - collectionFormat: csv
        description: Category filter (repeatable; matches any)
        in: query
        items:
          type: string
        name: category
        type: array
      - collectionFormat: csv
        description: 'Difficulty filter (repeatable: easy|medium|hard)'
        in: query
        items:
          type: string
        name: difficulty
        type: array
      - description: Minimum raw score (inclusive)
        in: query
        name: score_min
        type: integer
      - description: Maximum raw score (inclusive)
        in: query
        name: score_max
        type: integer
      - description: Solved-on start date YYYY-MM-DD (inclusive)
        in: query
        name: from
        type: string
      - description: Solved-on end date YYYY-MM-DD (inclusive)
        in: query
        name: to
        type: string
      - description: Page size (default 20)
        in: query
        name: limit
        type: integer
      - description: Record offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Paginated problem list
          schema:
            $ref: '#/definitions/handlers.listProblemsResponse'
        "401":
          description: Missing or invalid JWT token
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: List logged problems with filtering and pagination
      tags:
      - problems
    post:
      consumes:
      - application/json
      description: 'Records a LeetCode problem attempt and computes a score. Score
        formula: base 100, -10 per extra attempt (capped -40), -25 if solution viewed,
        floor 5. Decay applies at read time: 3-day grace period, then -2pts/day, floor
        at 30% of raw score.'
      parameters:
      - description: Problem attempt details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.logProblemRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created problem with computed score
          schema:
            $ref: '#/definitions/handlers.problemResponse'
        "400":
          description: Invalid input — bad category, difficulty, or missing name
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "401":
          description: Missing or invalid JWT token
          schema:
            $ref: '#/definitions/handlers.errorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.errorResponse'
      security:
      - BearerAuth: []
      summary: Log a new problem attempt
      tags:
      - problems
securityDefinitions:
  BearerAuth:
    description: 'Enter your Clerk session token as: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
